<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News - HY HCI Group</title>
    <link rel="stylesheet" href="../styles.css?v=20251128">
</head>
<body>
    <div id="header-placeholder"></div>
    <main class="page-content">
        <div class="page-header">
            <div class="container">
                <h1 class="page-title">News</h1>
                <p class="page-breadcrumb">
                    <a href="../index.html">Home</a> &gt; <span>News</span>
                </p>
            </div>
        </div>
        <section class="content-section">
            <div class="container">
                <div class="content-box">
                    <h2>All News</h2>
                    <div class="notice-table">
                        <div class="notice-row notice-header-row">
                            <div class="notice-num">No.</div>
                            <div class="notice-subject">Title</div>
                            <div class="notice-author">Author</div>
                            <div class="notice-date-col">Date</div>
                        </div>
                        <div id="notice-list">
                            <div class="notice-row">
                                <div class="notice-num" colspan="5" style="text-align: center; padding: 40px;">
                                    Loading...
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="pagination" id="pagination"></div>
                </div>
            </div>
        </section>
    </main>
    <div id="footer-placeholder"></div>
    <script src="../components.js"></script>
    <script src="../script.js"></script>
    <script src="../js/data-loader.js"></script>
    <script src="../js/notice-list.js"></script>
</body>
</html>
