    <!-- Main Banner -->
    <div class="hero-banner">
        <div class="hero-content">
            <p class="hero-eyebrow">HY HCI Group</p>
            <h2 class="hero-title">Hanyang University<br>Human Computer Interaction Group</h2>
            <p class="hero-sub">Designing intelligent systems that work better for people.</p>
            <div class="hero-divider"></div>
            <div class="hero-keywords">
                <span>Artificial Intelligence</span>
                <span>Computer Science</span>
                <span>Data Science</span>
                <span>Design</span>
            </div>
        </div>
    </div>

    <style>
        .home-section {
            padding: 40px 0 0;
        }
        .home-section:last-child {
            padding-bottom: 64px;
        }
        .home-section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0;
        }
        .home-section-header h2 {
            font-size: 2rem;
            font-weight: 800;
            color: #4A77EA;
            margin: 0 0 10px;
            letter-spacing: -0.01em;
            position: relative;
            padding-bottom: 10px;
        }
        .home-section-header h2::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 36px;
            height: 3px;
            background: #4A77EA;
            border-radius: 2px;
        }
        .home-section-header .more-link {
            margin-bottom: 10px;
            align-self: flex-end;
        }

        /* News / Events list */
        .home-notice-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }
        .home-notice-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 13px 4px;
            border-bottom: 1px solid #eee;
        }
        .home-notice-item .notice-badge { flex-shrink: 0; }
        .home-notice-item .notice-title {
            flex: 1;
            font-size: 0.95rem;
            color: #222;
            text-decoration: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .home-notice-item .notice-title:hover { color: #4A77EA; }
        .home-notice-item .notice-date {
            flex-shrink: 0;
            font-size: 0.82rem;
            color: #999;
        }

        /* Gallery grid */
        .home-gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding-top: 14px;
        }
        .home-gallery-item {
            aspect-ratio: 1 / 1;
            border-radius: 10px;
            overflow: hidden;
            background: #e8edf3;
        }
        .home-gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
    </style>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">

            <!-- News -->
            <section class="home-section">
                <div class="home-section-header">
                    <h2>News</h2>
                    <a href="community/notice.html" class="more-link">View All +</a>
                </div>
                <ul class="home-notice-list" id="home-news-list"></ul>
            </section>

            <!-- Events -->
            <section class="home-section">
                <div class="home-section-header">
                    <h2>Events</h2>
                    <a href="community/news.html" class="more-link">View All +</a>
                </div>
                <ul class="home-notice-list" id="home-events-list"></ul>
            </section>

            <!-- Gallery -->
            <section class="home-section">
                <div class="home-section-header">
                    <h2>Gallery</h2>
                    <a href="community/gallery.html" class="more-link">View All +</a>
                </div>
                <div class="home-gallery-grid" id="home-gallery-grid"></div>
            </section>

        </div>
    </main>

    <!-- Footer -->
    <div id="footer-placeholder"></div>

    <script src="components-index.js"></script>
    <script src="script.js"></script>
    <script src="js/data-loader.js"></script>
    <script src="js/index-notices.js"></script>
    <script src="js/popup.js"></script>

    <!-- Netlify Identity 리다이렉트 처리 -->
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
